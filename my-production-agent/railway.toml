[build]
builder = "DOCKERFILE"

[deploy]
# Phải bọc sh -c: Railway chạy startCommand không qua shell nên $PORT không được expand
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --timeout-graceful-shutdown 30'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
